name: Update resume PDF from Google Docs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  update_resume:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest PDF
        run: |
          DOC_ID="1Y6v6AAJA2YVP1i0kyErn5qLB-9Y0LZoy"
          curl -fL "https://docs.google.com/document/d/${DOC_ID}/export?format=pdf" -o resume.pdf

      - name: Commit if changed
        run: |
          git config user.name "fastfruits"
          git config user.email "nicholasahenry06@gmail.com"
          git add resume.pdf
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: auto update resume"
            git push
          fi
